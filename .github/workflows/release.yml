name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake test

      - name: Build gem
        run: gem build readability-rb.gemspec

      - name: Push to RubyGems
        run: gem push readability-rb-*.gem
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}

      - name: Create GitHub Release
        run: gh release create ${{ github.ref_name }} readability-rb-*.gem --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
